name: Daily Paper Scraper

on:
  schedule:
    - cron: "0 8 * * 1-5"  # 8am UTC, weekdays only (arXiv is quiet on weekends)
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD). Defaults to yesterday."
        required: false
      dry_run:
        description: "Dry run (no DB write, no Telegram)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Paper-Scrapper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Paper-Scrapper/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="--date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scraper.py $ARGS
